GlobalParameters:
  KeepBuildTmp: True
  AsmDebug: True
jobs:
    -
        kernel_include_regex: "pa_mqa_logits_fp4_kernel_0"
        kernel_exclude_regex:
        kernel_iteration_range: "[6, [8-8]]"
        output_file: out
        output_directory: /sgl-workspace/jin/fp4_mqa_probe/prof/att_big
        output_format: [json, csv]
        truncate_kernels: true
        sys_trace: false
        advanced_thread_trace: true
        att_target_cu: 1
        att_shader_engine_mask: "0xf"
        att_simd_select: "0xf"
        att_buffer_size: "0xC000000"
